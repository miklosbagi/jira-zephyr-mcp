# Build and push container images for every PR to main (same-repo only).
#
# Tags (both Docker Hub and GHCR):
#   - Always: dev-YYYY-MM-DD-<7-char-sha>  (e.g. dev-2026-03-23-506ea31)
#   - If the PR head commit has a git tag matching vMajor.Minor.Patch: also push that tag + :latest
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN      (Docker Hub access token / PAT with read & write)
#
# GHCR: GitHub forbids *naming* a repo secret GITHUB_* (reserved prefix). Use GH_TOKEN
# for a PAT with write:packages (classic) or "Contents: read" + "Packages: write"
# (fine-grained), scoped to this repo. If GH_TOKEN is unset, login uses github.token
# (same as the built-in GITHUB_TOKEN — no secret to create).
#
# Security: fork PRs are skipped — untrusted code must not receive registry credentials.
name: Docker (PR)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          # Prefer GH_TOKEN (repo secret); never name a secret GITHUB_* — use built-in github.token if no PAT.
          password: ${{ secrets.GH_TOKEN || github.token }}

      - name: Compute image tags
        id: meta
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          SHORT=$(echo "$HEAD_SHA" | cut -c1-7)
          DATE=$(date -u +%Y-%m-%d)
          DEV_TAG="dev-${DATE}-${SHORT}"

          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          DOCKERHUB_IMG="docker.io/${REPO_LC}"
          GHCR_IMG="ghcr.io/${REPO_LC}"

          TAGS="${DOCKERHUB_IMG}:${DEV_TAG}"$'\n'"${GHCR_IMG}:${DEV_TAG}"

          SEMVER_RE='^v[0-9]+\.[0-9]+\.[0-9]+$'
          HAS_SEMVER=false
          while IFS= read -r t; do
            [ -z "$t" ] && continue
            if echo "$t" | grep -Eq "$SEMVER_RE"; then
              HAS_SEMVER=true
              TAGS+=$'\n'"${DOCKERHUB_IMG}:${t}"
              TAGS+=$'\n'"${GHCR_IMG}:${t}"
            fi
          done < <(git tag --points-at HEAD || true)

          if [ "$HAS_SEMVER" = true ]; then
            TAGS+=$'\n'"${DOCKERHUB_IMG}:latest"
            TAGS+=$'\n'"${GHCR_IMG}:latest"
          fi

          echo "dev_tag=${DEV_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
