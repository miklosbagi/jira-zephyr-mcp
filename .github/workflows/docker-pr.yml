# Dev / preview images for PRs to main (same-repo only).
#
# Tags (Docker Hub + GHCR):
#   - dev-v<package.json version>-<7-char-sha> — unique per commit (e.g. dev-v0.10.0-a1b2c3d)
#   - dev — rolling tag; always points at the **last successful** build from this workflow
#     (same digest as that run’s unique tag). Last PR build wins if several PRs run close together.
#
# Triggers:
#   - pull_request (opened, synchronize, reopened, ready_for_review): **synchronize** runs on
#     every new commit pushed to the PR branch (including force-push), so each update gets a new image.
#   - workflow_dispatch: rebuild for a PR number without a new commit (same checks: targets main,
#     same repo, not draft).
#
# Production v* and :latest are pushed by docker-release.yml when you push a semver tag after merge.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN      (Docker Hub access token / PAT with read & write)
#
# GHCR: GitHub forbids *naming* a repo secret GITHUB_* (reserved prefix). Use GH_TOKEN
# for a PAT with write:packages (classic) or "Contents: read" + "Packages: write"
# (fine-grained), scoped to this repo. If GH_TOKEN is unset, login uses github.token
# (same as the built-in GITHUB_TOKEN — no secret to create).
#
# Security: fork PRs are skipped — untrusted code must not receive registry credentials.
#
# Draft PRs: no build (saves registry churn). When you mark the PR ready, `ready_for_review`
# runs a build without requiring a new commit (synchronize alone does not fire on draft→ready).
# Pushes while draft still trigger the workflow run, but the Docker job is skipped (check Actions).
#
# Images are built for linux/amd64 and linux/arm64 (Apple Silicon) via QEMU + buildx.
#
# PR comment: marocchino/sticky-pull-request-comment@v3 with number_force + github.token so the
# same comment is updated on synchronize (not only on opened). secrets.GITHUB_TOKEN is invalid.
name: Docker (PR)

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (must target main, same repo, not draft). Rebuilds image without a new commit.'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  pull-requests: write

# One active build per PR; newest push wins (avoids stacked runs finishing out of order).
concurrency:
  group: docker-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  build-push:
    if: |
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.draft == false) ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR head SHA
        id: head
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR="${{ github.event.inputs.pr_number }}"
          API="repos/${{ github.repository }}/pulls/${PR}"
          BASE=$(gh api "$API" --jq .base.ref)
          DRAFT=$(gh api "$API" --jq .draft)
          FORK=$(gh api "$API" --jq .head.repo.full_name)
          SHA=$(gh api "$API" --jq .head.sha)
          if [ "$BASE" != "main" ]; then
            echo "::error::PR #$PR must target main (got base: $BASE)"
            exit 1
          fi
          if [ "$DRAFT" = "true" ]; then
            echo "::error::PR #$PR is still a draft — mark ready for review first."
            exit 1
          fi
          if [ "$FORK" != "${{ github.repository }}" ]; then
            echo "::error::Fork PRs are not built (head repo: $FORK)"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.head.outputs.sha }}
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          # Prefer GH_TOKEN (repo secret); never name a secret GITHUB_* — use built-in github.token if no PAT.
          password: ${{ secrets.GH_TOKEN || github.token }}

      - name: Compute dev image tags
        id: meta
        env:
          HEAD_SHA: ${{ steps.head.outputs.sha }}
        run: |
          set -euo pipefail
          SHORT=$(echo "$HEAD_SHA" | cut -c1-7)
          VERSION=$(jq -r .version package.json)
          DEV_TAG="dev-v${VERSION}-${SHORT}"

          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          DOCKERHUB_IMG="docker.io/${REPO_LC}"
          GHCR_IMG="ghcr.io/${REPO_LC}"

          TAGS="${DOCKERHUB_IMG}:${DEV_TAG}"$'\n'"${GHCR_IMG}:${DEV_TAG}"
          TAGS+=$'\n'"${DOCKERHUB_IMG}:dev"
          TAGS+=$'\n'"${GHCR_IMG}:dev"

          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          LINK_DH="https://hub.docker.com/r/${REPO_LC}/tags?name=${DEV_TAG}"
          LINK_GHCR="https://github.com/${{ github.repository }}/pkgs/container/${REPO_NAME}"

          echo "dev_tag=${DEV_TAG}" >> "$GITHUB_OUTPUT"
          echo "repo_lc=${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "link_dockerhub=${LINK_DH}" >> "$GITHUB_OUTPUT"
          echo "link_ghcr=${LINK_GHCR}" >> "$GITHUB_OUTPUT"
          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}

      - name: Comment PR with dev image links
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: dev-docker-image
          # Use number_force so the same sticky comment is updated on every push (synchronize),
          # not only on opened. Do not use step outputs here (string vs number confused updates).
          number_force: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          message: |
            ### Dev Docker image

            **Multi-arch** image (`linux/amd64`, `linux/arm64`) for commit [`${{ steps.head.outputs.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.head.outputs.sha }}):

            | Registry | Pull |
            |----------|------|
            | **Docker Hub** | [`docker.io/${{ steps.meta.outputs.repo_lc }}:${{ steps.meta.outputs.dev_tag }}`](${{ steps.meta.outputs.link_dockerhub }}) |
            | **GHCR** | [`ghcr.io/${{ steps.meta.outputs.repo_lc }}:${{ steps.meta.outputs.dev_tag }}`](${{ steps.meta.outputs.link_ghcr }}) |

            **Unique tag:** `${{ steps.meta.outputs.dev_tag }}` — **rolling `dev`** (same digest as this build): `docker.io/${{ steps.meta.outputs.repo_lc }}:dev` and `ghcr.io/${{ steps.meta.outputs.repo_lc }}:dev`.

            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · each push updates this comment.
          GITHUB_TOKEN: ${{ github.token }}
