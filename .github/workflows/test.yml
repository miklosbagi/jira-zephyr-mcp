# Required checks for `main`: enable branch protection → require status check **Quality gate**
# (lint + typecheck + tests with coverage thresholds). One job = one gate to tick in repo settings.
name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests + coverage
        run: npm run test:coverage

      # Tokenless upload on public repos. Add secret CODECOV_TOKEN if Codecov asks for it.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
