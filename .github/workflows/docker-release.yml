# Production images: semver tag + latest (Docker Hub + GHCR).
# Run after merge by pushing a version tag on main, e.g.:
#   git tag v0.8.2 main && git push origin v0.8.2
#
# This avoids overwriting :latest or v* with unmerged PR builds (those use docker-pr.yml dev-* only).
#
# Secrets: same as Docker (PR) — DOCKERHUB_USERNAME, DOCKERHUB_TOKEN; optional GH_TOKEN for GHCR.
name: Docker (release)

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5

      - name: Validate semver tag
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag $TAG is not vMajor.Minor.Patch — skipping image push."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.ver.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.ver.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: steps.ver.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_TOKEN || github.token }}

      - name: Compute image tags
        if: steps.ver.outputs.skip == 'false'
        id: meta
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version_tag }}"
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          DOCKERHUB_IMG="docker.io/${REPO_LC}"
          GHCR_IMG="ghcr.io/${REPO_LC}"
          TAGS="${DOCKERHUB_IMG}:${V}"$'\n'"${GHCR_IMG}:${V}"
          TAGS+=$'\n'"${DOCKERHUB_IMG}:latest"
          TAGS+=$'\n'"${GHCR_IMG}:latest"
          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: steps.ver.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
